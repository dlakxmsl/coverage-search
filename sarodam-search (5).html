<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="새로담는검색">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F5EF">
<title>새로담는건강보험 검색</title>
<style>
:root{
  --paper:#F7F5EF;--card:#FFF;--alt:#EFEAE0;
  --ink:#1B2A4A;--soft:#3C4A66;--muted:#6B7280;
  --line:#DAD5C8;--line-soft:#E8E3D7;
  --H:#1B4F8A;--G:#6B35A0;--E:#1A7A4A;
  --ok:#2B6CB0;--no:#B23A33;--cond:#9A6B1E;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
#app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
header{padding:16px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--paper);z-index:10;}
.brand{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:10px;}
.brand span{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px;}
/* 모드 탭 */
.mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
.mtab{flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid var(--line);background:var(--card);font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;}
.mtab.on{border-color:var(--ink);background:var(--ink);color:#fff;}
/* 체류코드 카드 */
.res-card{background:var(--card);border:1px solid var(--line-soft);border-radius:10px;padding:13px 15px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.res-left{flex:1;}
.res-code{font-weight:700;font-size:15px;color:var(--ink);}
.res-label{font-size:12px;color:var(--muted);margin-top:2px;}
.res-note{font-size:11.5px;color:var(--soft);margin-top:6px;line-height:1.6;background:var(--alt);padding:6px 9px;border-radius:6px;}
.res-status{font-size:13px;font-weight:800;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.res-status.ok{color:var(--ok);background:rgba(43,108,176,.1);}
.res-status.no{color:var(--no);background:rgba(178,58,51,.1);}

/* 플러스(BLUE/GOLD) 전용 */
.plus-cats{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pcbtn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);font-size:11.5px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;}
.pcbtn.on{border-color:var(--ink);background:var(--ink);color:#fff;}
.plus-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:12px;}
.plus-table th{background:var(--alt);padding:6px 8px;font-weight:700;font-size:11px;text-align:left;color:var(--soft);border:1px solid var(--line-soft);}
.plus-table td{padding:6px 8px;border:1px solid var(--line-soft);vertical-align:top;}
.plus-table td.center{text-align:center;}
.plus-rule-box{font-size:12px;color:var(--soft);line-height:1.7;background:var(--card);border:1px solid var(--line-soft);border-radius:8px;padding:10px 12px;margin-bottom:8px;}
.plus-cross{font-size:11.5px;color:var(--muted);background:var(--alt);border-radius:6px;padding:7px 10px;margin-top:6px;}
.rider-card{background:var(--card);border:1px solid var(--line-soft);border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.rider-cat{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--alt);color:var(--soft);display:inline-block;margin-bottom:6px;}
.rider-name{font-weight:700;font-size:14.5px;color:var(--ink);margin-bottom:6px;}
.rider-row{font-size:12.5px;margin-top:4px;line-height:1.6;}
.rider-row b{color:var(--soft);font-weight:700;margin-right:4px;}

/* 상품 필터 */
.filters{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.fbtn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--line);background:var(--card);font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;}
.fbtn.on{border-color:var(--ink);color:var(--ink);background:var(--ink);color:#fff;}
.fbtn.H{border-color:var(--H);}
.fbtn.H.on{background:var(--H);border-color:var(--H);}
.fbtn.G{border-color:var(--G);}
.fbtn.G.on{background:var(--G);border-color:var(--G);}
.fbtn.E{border-color:var(--E);}
.fbtn.E.on{background:var(--E);border-color:var(--E);}
input[type=text]{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:16px;font-family:inherit;color:var(--ink);background:var(--card);}
input[type=text]:focus{outline:2px solid var(--ink);outline-offset:1px;border-color:var(--ink);}
.hint{font-size:11.5px;color:var(--muted);margin-top:7px;}
main{flex:1;padding:12px 16px 50px;}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:60px 16px;line-height:1.9;}
.sec-label{font-size:11.5px;font-weight:700;color:var(--ink);margin:16px 0 7px;letter-spacing:.03em;}
.sec-label:first-child{margin-top:0;}
/* 카드 */
.card{background:var(--card);border:1px solid var(--line-soft);border-radius:10px;padding:13px 15px;margin-bottom:9px;}
.card-title{font-weight:700;font-size:15px;color:var(--ink);margin-bottom:6px;}
.cat-badge{display:inline-block;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:4px;background:var(--alt);color:var(--soft);margin-bottom:7px;}
/* 상품 배지 */
.pbadges{display:flex;gap:5px;margin-bottom:9px;flex-wrap:wrap;}
.pbadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;color:#fff;}
.pbadge.H{background:var(--H);}
.pbadge.G{background:var(--G);}
.pbadge.E{background:var(--E);}
/* 한도 테이블 */
.limit-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px;}
.limit-table th{background:var(--alt);padding:5px 8px;font-weight:600;font-size:11.5px;text-align:left;color:var(--soft);}
.limit-table td{padding:5px 8px;border-top:1px solid var(--line-soft);}
.limit-table td.amt{font-weight:700;font-family:'SF Mono','Courier New',monospace;color:var(--ink);}
.limit-table td.amt.H{color:var(--H);}
.limit-table td.amt.G{color:var(--G);}
.limit-table td.amt.E{color:var(--E);}
.note-box{margin-top:8px;font-size:11.5px;color:var(--soft);padding:7px 10px;background:var(--alt);border-radius:6px;line-height:1.6;}
/* UW 카드 */
.uw-grid{display:grid;grid-template-columns:1fr auto;gap:5px 8px;font-size:13px;margin-bottom:4px;}
.uw-cat{color:var(--soft);}
.uw-val{font-weight:700;text-align:right;}
.uw-val.ok{color:var(--ok);}
.uw-val.no{color:var(--no);}
.uw-val.cond{color:var(--cond);}
.uw-val.day{color:var(--cond);}
.no-result{color:var(--muted);font-size:12.5px;padding:20px 0;text-align:center;}
</style>
</head>
<body>
<div id="app">
<header>
  <div class="brand">새로담는 검색<span>라이나 새로담는건강보험 시리즈</span></div>
  <div class="mode-tabs">
    <button class="mtab on" id="m-uw" onclick="setMode('uw')">질병/한도 검색</button>
    <button class="mtab" id="m-res" onclick="setMode('res')">외국인체류코드</button>
  </div>
  <div class="filters" id="filters-uw">
    <button class="fbtn on" id="f-ALL" onclick="setFilter('ALL')">전체</button>
    <button class="fbtn H" id="f-H" onclick="setFilter('H')">건강심사형플러스</button>
    <button class="fbtn G" id="f-G" onclick="setFilter('G')">일반심사형</button>
    <button class="fbtn E" id="f-E" onclick="setFilter('E')">간편심사형</button>
  </div>
  <input type="text" id="q" placeholder="담보명 또는 질병명 검색 (예: 암진단, 디스크, 골절)" autocomplete="off" autocapitalize="off">
  <div class="hint" id="hint">담보한도 + 3N5(132항목) + SI 예외질환(710항목) 수록 · 오프라인 작동</div>
</header>
<main id="results">
  <div class="empty">담보명이나 질병명을 입력하세요.<br><br>예) "뇌출혈" · "관절" · "디스크" · "암진단" · "양성신생물"</div>
</main>
</div>

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function valClass(v){
  if(v==='즉시인수') return 'ok';
  if(v==='불가') return 'no';
  if(v.startsWith('30일')) return 'day';
  return 'cond';
}
function valShort(v){
  if(v==='즉시인수') return '즉시인수';
  if(v==='불가') return '불가';
  if(v==='30일경과 인수') return '30일경과';
  if(v==='30일경과 인수(수술불가)') return '30일경과(수술불가)';
  if(v==='조건부(세부확인)') return '조건부';
  return v;
}

function renderLimit(item){
  // 현재 필터에 맞는 상품 결정
  const showProds = curFilter==='ALL' ? PRODUCTS : [curFilter];
  
  // 컬럼 헤더 결정
  let hasMultiProd = showProds.length > 1;
  const allSame = hasMultiProd && item.brackets.every(b => {
    const vals = showProds.map(p=>b[p]).filter(v=>v!==undefined);
    return vals.every(v=>v===vals[0]);
  });

  let html = '<div class="card">';
  html += '<div class="cat-badge">'+esc(item.cat)+'</div>';
  html += '<div class="card-title">'+esc(item.name)+'</div>';
  
  // 상품 배지
  html += '<div class="pbadges">';
  showProds.forEach(p=>{ html += '<span class="pbadge '+p+'">'+esc(PNAMES[p])+'</span>'; });
  html += '</div>';

  // 한도 테이블
  html += '<table class="limit-table"><thead><tr><th>나이구간</th>';
  if(allSame || showProds.length===1){
    html += '<th>가입한도</th>';
  } else {
    showProds.forEach(p=>{ html += '<th>'+esc(PNAMES[p].slice(0,4))+'</th>'; });
  }
  html += '</tr></thead><tbody>';

  item.brackets.forEach(b=>{
    html += '<tr><td>'+esc(b.l)+'</td>';
    if(allSame || showProds.length===1){
      const v = b[showProds[0]];
      html += '<td class="amt">'+(v?v+'만원':'-')+'</td>';
    } else {
      showProds.forEach(p=>{
        const v = b[p];
        html += '<td class="amt '+p+'">'+(v!==undefined?v+'만':'—')+'</td>';
      });
    }
    html += '</tr>';
  });
  html += '</tbody></table>';

  if(item.note){
    html += '<div class="note-box">'+esc(item.note)+'</div>';
  }
  html += findAggLinkHtml(item.name, LIMITS_AGG_LINK);
  html += '</div>';
  return html;
}

  let html = '<div class="card">';

function setMode(m){
  curMode=m;
  document.getElementById('m-uw').classList.toggle('on', m==='uw');
  document.getElementById('m-res').classList.toggle('on', m==='res');
  document.getElementById('filters-uw').style.display = m==='uw' ? 'flex' : 'none';
  const q=document.getElementById('q');
  if(m==='res'){

}

function findAggLinkHtml(riderName, map){
  map = map || AGG_LINK;
  const links = map[riderName];
  if(!links || !links.length) return '';
  let html = '<div class="rider-row" style="margin-top:8px;"><b>당사·업계 합산한도</b></div>';
  links.forEach(l=>{
    if(l.indexOf('AGE:')===0){
      const name = l.slice(4);
      const row = PLUSDATA.aggCancerAge.find(r=>r.name===name);
      if(row){
        let line = esc(row.name)+': 30~40세 '+esc(row.d3040)+' · 41~60세 '+esc(row.d4160)+' · 61~80세 '+esc(row.d6180);
        if(row.biz3050 && row.biz3050!=='-') line += ' · 업계 30~50세 '+esc(row.biz3050)+' · 51~80세 '+esc(row.biz5180);
        html += '<div class="plus-cross">'+line+'</div>';
      }
    } else if(l.indexOf('OUT:')===0){
      const code = l.slice(4);
      const row = PLUSDATA.aggCancerOut.find(r=>r.code===code);
      if(row){
        html += '<div class="plus-cross">'+esc(row.name)+' 당사합산: '+esc(row.amt)+'</div>';
      }
    }
  });
  return html;
}

function doSearch(){
  const q = document.getElementById('q').value;
  const nq = norm(q);
  const res = document.getElementById('results');

  // 체류코드 모드는 별도 (예/아니오 조회이므로 통합검색 대상 아님)
  if(curMode==='res'){
    if(!nq){
      res.innerHTML='<div class="empty">체류코드(예: D-7) 또는 체류자격명(예: 방문취업)을 입력하세요.</div>';
      return;
    }
    const matches = RESIDENCY.filter(item=>{
      if(norm(item.code).includes(nq)) return true;
      if(norm(item.label).includes(nq)) return true;
      return false;
    });
    if(!matches.length){
      res.innerHTML='<div class="no-result">검색 결과가 없어요. 체류코드(예: D-7) 또는 체류자격명으로 검색해보세요.</div>';
      return;
    }
    let rhtml='<div class="sec-label">🌏 외국인 체류코드별 가입 유무 ('+matches.length+')</div>';
    matches.forEach(item=>{ rhtml+=renderResidency(item); });
    res.innerHTML=rhtml;
    return;
  }

  if(!nq){
    res.innerHTML='<div class="empty">담보명이나 질병명을 입력하세요.<br><br>예) "뇌출혈" · "관절" · "디스크" · "암진단" · "양성신생물" · "다빈치"</div>';
    return;
  }

  // ===== 통합 검색: 기존 상품(H/G/E) + 새담플러스(BLUE/GOLD) 전체를 항상 함께 검색 =====
  let html='', total=0;

  // 1. 기존 상품 담보한도 검색
  const showProds = curFilter==='ALL' ? PRODUCTS : [curFilter];
  const limMatches = LIMITS.filter(item=>{
    if(norm(item.name).includes(nq)) return true;
    if(norm(item.cat).includes(nq)) return true;
    if(item.keywords && item.keywords.some(k=>norm(k).includes(nq))) return true;
    return false;
  });
  if(limMatches.length){
    html += '<div class="sec-label">📋 [기존상품] 가입한도 ('+limMatches.length+')</div>';
    limMatches.forEach(item=>{ html+=renderLimit(item); });
    total+=limMatches.length;
  }

  // 2. 3N5 경증예외질환 검색
  const uwMatches = UW.filter(row=>norm(row.name).includes(nq));
  if(uwMatches.length){
    html += '<div class="sec-label">✅ [기존상품] 3N5 경증예외질환 인수기준 ('+uwMatches.length+')</div>';
    uwMatches.slice(0,30).forEach(row=>{ html+=renderUW(row); });
    total+=uwMatches.length;
  }

  // 3. SI 인수 710 검색
  const uw710Matches = UW710.filter(row=>norm(row.name).includes(nq)||norm(row.cat).includes(nq));
  if(uw710Matches.length){
    html += '<div class="sec-label">🔍 [기존상품] SI 예외질환 인수기준 ('+uw710Matches.length+'개 / 전체 710개)</div>';
    uw710Matches.slice(0,30).forEach(row=>{ html+=renderUW710(row); });
    if(uw710Matches.length>30) html+='<div style="color:var(--muted);font-size:12px;padding:8px 0;">... '+uw710Matches.length+'개 중 30개만 표시. 검색어를 더 구체적으로 입력해보세요.</div>';
    total+=uw710Matches.length;
  }

  // 4. 새담플러스(BLUE/GOLD) 비갱신/갱신 특약
  const nrMatches = PLUSDATA.nonrenew.filter(r=>norm(r.name).includes(nq)||norm(r.cat).includes(nq));
  const rnMatches = PLUSDATA.renew.filter(r=>norm(r.name).includes(nq)||norm(r.cat).includes(nq));
  if(nrMatches.length){
    html += '<div class="sec-label">📋 [새담플러스] 비갱신형 특약 ('+nrMatches.length+')</div>';
    nrMatches.forEach(r=>{ html+=renderRider(r,'비갱신'); });
    total+=nrMatches.length;
  }
  if(rnMatches.length){
    html += '<div class="sec-label">🔄 [새담플러스] 갱신형 특약 ('+rnMatches.length+')</div>';
    rnMatches.forEach(r=>{ html+=renderRider(r,'갱신'); });
    total+=rnMatches.length;
  }

  // 5. 새담플러스 합산한도(연령대별 암 / 암통원비)
  const aggAgeMatches = PLUSDATA.aggCancerAge.filter(r=>norm(r.name).includes(nq));
  const aggOutMatches = PLUSDATA.aggCancerOut.filter(r=>norm(r.name).includes(nq));
  if(aggAgeMatches.length){
    html += '<div class="sec-label">➕ [새담플러스] 연령대별 암 합산한도 ('+aggAgeMatches.length+')</div>';
    aggAgeMatches.forEach(r=>{ html+=renderAggAgeCard(r); });
    total+=aggAgeMatches.length;
  }
  if(aggOutMatches.length){
    html += '<div class="sec-label">➕ [새담플러스] 암통원비 합산한도 ('+aggOutMatches.length+')</div>';
    aggOutMatches.forEach(r=>{ html+=renderAggOutCard(r); });
    total+=aggOutMatches.length;
  }

  // 6. 새담플러스 상품개요 / 한도상향 / 신규담보매트릭스
  const ovMatches = PLUSDATA.overview.filter(r=>norm(r.item).includes(nq)||norm(r.common||'').includes(nq)||norm(r.blue||'').includes(nq)||norm(r.gold||'').includes(nq));
  if(ovMatches.length){
    html += '<div class="sec-label">📑 [새담플러스] 상품개요 ('+ovMatches.length+')</div>';
    ovMatches.forEach(r=>{ html+=renderOverviewMatch(r); });
    total+=ovMatches.length;
  }
  const luMatches = PLUSDATA.limitup.filter(r=>norm(r.name).includes(nq));
  if(luMatches.length){
    html += '<div class="sec-label">📈 [새담플러스] 한도상향 ('+luMatches.length+')</div>';
    luMatches.forEach(r=>{ html+=renderLimitupMatch(r); });
    total+=luMatches.length;
  }
  const mxMatches = PLUSDATA.matrix.filter(r=>norm(r.name).includes(nq)||norm(r.desc).includes(nq)||norm(r.cat).includes(nq));
  if(mxMatches.length){
    html += '<div class="sec-label">🧩 [새담플러스] 신규담보매트릭스 ('+mxMatches.length+')</div>';
    mxMatches.forEach(r=>{ html+=renderMatrixMatch(r); });
    total+=mxMatches.length;
  }

  // 7. 새담플러스 간병비/종합병원이상입원 합산규정 텍스트
  const careMatches = PLUSDATA.aggCare.rules.filter(t=>norm(t).includes(nq));
  const careCrossMatch = norm(PLUSDATA.aggCare.cross).includes(nq) ? [PLUSDATA.aggCare.cross] : [];
  if(careMatches.length || careCrossMatch.length){
    html += '<div class="sec-label">➕ [새담플러스] 간병비 합산한도 규정</div>';
    careMatches.forEach(t=>{ html+=renderRuleMatch(t,'간병비 합산한도'); });
    careCrossMatch.forEach(t=>{ html+=renderRuleMatch(t,'간병비 타사합산'); });
    total+=careMatches.length+careCrossMatch.length;
  }
  const hospMatches = PLUSDATA.aggHosp.rules.filter(t=>norm(t).includes(nq));
  const hospCrossMatch = norm(PLUSDATA.aggHosp.cross).includes(nq) ? [PLUSDATA.aggHosp.cross] : [];
  if(hospMatches.length || hospCrossMatch.length){
    html += '<div class="sec-label">➕ [새담플러스] 종합병원이상 입원비 합산한도 규정</div>';
    hospMatches.forEach(t=>{ html+=renderRuleMatch(t,'종합병원이상입원 합산한도'); });
    hospCrossMatch.forEach(t=>{ html+=renderRuleMatch(t,'종합병원이상입원 타사합산'); });
    total+=hospMatches.length+hospCrossMatch.length;
  }

  if(!total){
    html='<div class="no-result">검색 결과가 없어요. 다른 표현으로 검색해보세요.</div>';
  }
  res.innerHTML=html;
}

const q=document.getElementById('q');
q.addEventListener('input',doSearch);
q.addEventListener('compositionend',doSearch);
q.addEventListener('keyup',doSearch);
</script>
</body>
