<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="가입한도검색">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F7F5EF">
<title>가입한도 검색</title>
<style>
  :root{
    --paper:#F7F5EF; --paper-card:#FFFFFF; --paper-alt:#EFEAE0;
    --ink:#1B2A4A; --ink-soft:#3C4A66; --indigo:#2F4172; --indigo-deep:#22335A;
    --blue-dot:#2B6CB0; --red-x:#B23A33; --amber:#9A6B1E;
    --line:#DAD5C8; --line-soft:#E8E3D7; --muted:#6B7280;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{background:var(--paper);color:var(--ink);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;-webkit-font-smoothing:antialiased;}
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  header{padding:18px 18px 14px;border-bottom:1px solid var(--line);flex-shrink:0;position:sticky;top:0;background:var(--paper);z-index:10;}
  .brand{font-family:'Apple SD Gothic Neo','Noto Serif KR',sans-serif;font-weight:700;font-size:19px;color:var(--ink);margin-bottom:10px;}
  .mode-tabs{display:flex;gap:6px;margin-bottom:10px;}
  .mtab{flex:1;padding:8px 10px;border-radius:8px;border:1.5px solid var(--line);background:var(--paper-card);font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;}
  .mtab.on{border-color:var(--ink);background:var(--ink);color:#fff;}
  .cat-header{font-size:13px;font-weight:700;color:var(--indigo);margin:20px 0 8px;padding-bottom:4px;border-bottom:1.5px solid var(--line);}
  .cat-header:first-child{margin-top:0;}
  .agg-block-card{background:var(--paper-alt);border-radius:10px;padding:12px 14px;margin-bottom:10px;font-size:12px;color:var(--ink-soft);line-height:1.75;white-space:pre-wrap;}
  .agg-block-title{font-size:12.5px;font-weight:700;color:var(--ink);margin-bottom:6px;}
  .brand span{font-size:11.5px;color:var(--muted);font-weight:400;font-family:'Noto Sans KR',sans-serif;margin-left:8px;}
  #searchBox{
    width:100%;border:1.5px solid var(--line);border-radius:10px;padding:13px 16px;
    font-size:17px;font-family:inherit;color:var(--ink);background:var(--paper-card);
  }
  #searchBox:focus{outline:2px solid var(--indigo);outline-offset:1px;border-color:var(--indigo);}
  .hint{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.6;}
  main{flex:1;padding:14px 18px 40px;overflow-y:auto;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:60px 20px;line-height:1.8;}
  .section-label{font-size:11.5px;font-weight:700;color:var(--indigo);margin:18px 0 8px;letter-spacing:0.02em;}
  .section-label:first-child{margin-top:0;}
  .card{background:var(--paper-card);border:1px solid var(--line-soft);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
  .card-title{font-family:'Apple SD Gothic Neo','Noto Serif KR',sans-serif;font-weight:600;font-size:15px;color:var(--ink);margin-bottom:8px;}
  .row{display:flex;justify-content:space-between;gap:10px;padding:5px 0;font-size:13.5px;border-top:1px solid var(--line-soft);}
  .row:first-of-type{border-top:none;}
  .row .k{color:var(--muted);flex-shrink:0;}
  .row .v{text-align:right;font-weight:500;}
  .limit-amt{font-family:'SF Mono','Courier New',monospace;font-weight:700;color:var(--indigo);font-size:15px;}
  .agg-box{margin-top:10px;padding:9px 12px;background:var(--paper-alt);border-radius:8px;font-size:12px;color:var(--ink-soft);line-height:1.75;white-space:pre-wrap;}
  .agg-label{font-size:11px;color:var(--amber);font-weight:700;margin-bottom:4px;font-family:'Noto Sans KR',sans-serif;}
  .code-pill{display:inline-block;font-family:'SF Mono','Courier New',monospace;font-size:11.5px;font-weight:700;background:var(--paper-alt);color:var(--ink-soft);padding:2px 7px;border-radius:5px;margin-left:6px;}
  .jong-pill{display:inline-block;font-size:11.5px;font-weight:700;background:var(--indigo);color:#fff;padding:2px 9px;border-radius:999px;}
  .uw-grid{display:grid;grid-template-columns:1fr auto;gap:6px 10px;font-size:13.5px;}
  .uw-cat{color:var(--ink-soft);}
  .uw-val{font-weight:700;text-align:right;}
  .uw-val.ok{color:var(--blue-dot);}
  .uw-val.no{color:var(--red-x);}
  .uw-val.cond{color:var(--amber);}
  .contract-list{margin-top:10px;padding-top:10px;border-top:1px solid var(--line-soft);}
  .contract-list summary{font-size:12px;color:var(--indigo);cursor:pointer;font-weight:600;}
  .contract-list ul{margin:8px 0 0;padding-left:18px;font-size:12px;color:var(--ink-soft);line-height:1.9;}
  .no-result{color:var(--muted);font-size:12.5px;}
  .top-no{color:var(--muted); font-family:'SF Mono','Courier New',monospace; font-size:11px;}
  ::selection{background:#D8E0F0;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">가입한도 검색<span>라이나 브레인케어건강보험</span></div>
    <div class="mode-tabs">
      <button class="mtab on" id="m-search" onclick="setMode('search')">통합검색</button>
      <button class="mtab" id="m-overview" onclick="setMode('overview')">가입한도 전체보기</button>
    </div>
    <input type="text" id="searchBox" placeholder="담보명 · 질병명 · 질병코드 검색 (예: 순환계, 알츠하이머, G30)" autocomplete="off" autocapitalize="off">
    <div class="hint" id="hint">타이핑하는 즉시 결과가 떠요. 인터넷 연결 없이도 작동해요.</div>
  </header>
  <main id="results">
    <div class="empty">담보명, 질병명, 또는 ICD 코드를 입력해보세요.<br><br>예) "순환계" · "알츠하이머" · "G30" · "장기요양3등급"</div>
  </main>
</div>

function parseRatePct(s){const m=s.match(/(\d+\.?\d*)\s*%/);return m?parseFloat(m[1]):null;}
function isMonthly(s){return s.includes('매월');}

function renderLimitCard(item){
  const brackets = LIMIT_BRACKETS[item.name]||null;
  const hasComputablePayout = !!(brackets && item.payouts && item.payouts.some(p=>parseRatePct(p.rate)!==null));

  let html = '<div class="card">';
  html += '<div class="card-title">'+escapeHtml(item.name)+'</div>';

  const enrollLinesHtml = (small) => {
    let h = '';
    const vClass = small ? 'v' : 'v limit-amt';
    const rowStyle = small ? ' style="font-size:11.5px;color:var(--muted);padding:3px 0;"' : '';
    h += '<div class="row"'+rowStyle+'><span class="k">판매단위(가입금액)</span><span class="'+vClass+'">'+escapeHtml(item.unit)+'</span></div>';
    h += '<div class="row"'+rowStyle+'><span class="k">최대가입한도</span><span class="'+vClass+'">'+escapeHtml(item.limit)+'</span></div>';
    return h;
  };

  const payoutSectionHtml = () => {
    if(!(item.payouts && item.payouts.length>0)) return '';
    let h = '<div style="margin-top:10px;"><div class="agg-label" style="color:var(--indigo);margin-bottom:5px;">💰 보험금 지급금액</div>';
    item.payouts.forEach(p=>{
      const pct=parseRatePct(p.rate);
      const monthly=isMonthly(p.rate);
      h += '<div style="margin-bottom:9px;">';
      h += '<div style="font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:2px;">'+escapeHtml(p.name)+'</div>';
      if(p.note) h += '<div style="font-size:11px;color:var(--amber);margin-bottom:2px;">'+escapeHtml(p.note)+'</div>';
      if(brackets && pct!==null){
        brackets.forEach(b=>{
          const amt=Math.round(b.m*pct/100);
          h += '<div class="row" style="padding:2px 0;">'
            +'<span class="k" style="font-size:11.5px;">'+escapeHtml(b.l)+'</span>'
            +'<span class="v"><b style="color:var(--indigo);font-family:monospace;font-size:14px;">'+(monthly?'월 ':'')+amt+'만원</b>'
            +'<span style="font-size:10.5px;color:var(--muted);margin-left:4px;">('+b.m+'만×'+pct+'%)</span></span>'
            +'</div>';
        });
      } else {
        h += '<div style="font-size:12.5px;color:var(--ink);">'+escapeHtml(p.rate)+'</div>';
      }
      h += '</div>';
    });
    h += '</div>';
    return h;
  };

  if(hasComputablePayout){
    // 지급금액을 실제로 계산할 수 있으면: 지급금액을 먼저, 가입금액은 참고용으로 작게 아래에
    html += payoutSectionHtml();
    html += '<div style="margin-top:10px;">'+enrollLinesHtml(true)+'</div>';
  } else {
    // 계산 불가능하면 기존 그대로: 가입금액이 먼저
    html += enrollLinesHtml(false);
    html += payoutSectionHtml();
  }

  if(item.agg){
    const aggLines=escapeHtml(item.agg).split('\\n').map(function(l){return l.charAt(0)==='★'?'<span style="color:#3730a3;font-weight:600;">'+l+'</span>':l;}).join('<br>');
    html += '<div class="agg-box">'+aggLines+'</div>';
  }
  html += '</div>';
  return html;
}

const DIAG_LIMITS = {
  '순환계Ⅰ': [
    {label:'70세이하', max:1000},
    {label:'71세이상', max:500},
  ],
  '순환계Ⅱ': [
        {label:'60세이하 뉴노멀Ⅱ', max:1000},
    {label:'61~70세', max:1000},
    {label:'71세이상', max:500},
  ],
  '정신계': [
    {label:'전연령', max:1000},
  ],
};

function calcDiagPayout(catKey, jong){
  const n = parseInt(jong);
  if(isNaN(n)) return [];

  if(catKey==='순환계'){
    const r = [];
    // 순환계Ⅱ 통합진단 (2종~5종)
    if(n>=2){
      let pct=0, tiers=[];
      if(n>=2){pct+=10; tiers.push('2-5종 10%');}
      if(n>=3){pct+=10; tiers.push('3-5종 10%');}
      if(n>=4){pct+=30; tiers.push('4-5종 30%');}
      if(n>=5){pct+=50; tiers.push('5종 50%');}
      const brackets = DIAG_LIMITS['순환계Ⅱ'].map(b=>({
        label:b.label,
        amt:Math.round(b.max * pct / 100)+'만원',
        base:b.max+'만원 × '+pct+'%'
      }));
      r.push({name:'순환계질환Ⅱ 통합진단', tiers:tiers, brackets:brackets, eligible:true});
    }
    // 순환계Ⅰ 통합진단 (3종~5종)
    if(n>=3){
      let pct=0, tiers=[];
      if(n>=3){pct+=20; tiers.push('3-5종 20%');}
      if(n>=4){pct+=30; tiers.push('4-5종 30%');}
      if(n>=5){pct+=50; tiers.push('5종 50%');}
      const brackets = DIAG_LIMITS['순환계Ⅰ'].map(b=>({
        label:b.label,
        amt:Math.round(b.max * pct / 100)+'만원',
        base:b.max+'만원 × '+pct+'%'
      }));
      r.push({name:'순환계질환Ⅰ 통합진단', tiers:tiers, brackets:brackets, eligible:true});
    } else {
      r.push({name:'순환계질환Ⅰ 통합진단', tiers:['2종 — 해당 없음'], brackets:[], eligible:false});
    }
    return r;
  }

  if(catKey==='정신계'){
    let pct=0, tiers=[];
    if(n>=1){pct+=2;  tiers.push('1-5종 2%');}
    if(n>=2){pct+=3;  tiers.push('2-5종 3%');}
    if(n>=3){pct+=5;  tiers.push('3-5종 5%');}
    if(n>=4){pct+=40; tiers.push('4-5종 40%');}
    if(n>=5){pct+=50; tiers.push('5종 50%');}
    const brackets = DIAG_LIMITS['정신계'].map(b=>({
      label:b.label,
      amt:Math.round(b.max * pct / 100)+'만원',
      base:b.max+'만원 × '+pct+'%'
    }));
    return [{name:'정신계질환 통합진단', tiers:tiers, brackets:brackets, eligible:true}];
  }

  if(catKey==='신경계'){
    return [{name:'신경계 — 진단특약 없음', tiers:['치료비만 보장'], brackets:[], eligible:false, nodiag:true}];
  }
  return [];
}

function categorizeLimit(name){
  if(name.indexOf('순환계질환')===0) return '순환계';
  if(name.indexOf('정신계질환')===0) return '정신계';
  if(name.indexOf('신경계질환')===0 || name.indexOf('신경계질환주요치료')===0) return '신경계';
  if(name.indexOf('LTC주요질병')===0) return '통원';
  if(name.indexOf('생활자금')!==-1) return 'LTC 생활자금';
  if(name.indexOf('장기요양')!==-1) return 'LTC 진단';
  return '치매약물';
}

function renderLimitsOverview(query){
  const results = document.getElementById('results');
  const nq = norm(query||'');
  const aggBlocks = RAW.limits.aggBlocks || {};

  if(!nq){
    const catOrder = ['순환계','정신계','신경계','통원','LTC 진단','LTC 생활자금','치매약물'];
    const grouped = {};
    catOrder.forEach(c=>grouped[c]=[]);
    LIMITS.forEach(item=>{
      const c = categorizeLimit(item.name);
      if(!grouped[c]) grouped[c]=[];
      grouped[c].push(item);
    });
    let html = '';
    catOrder.forEach(cat=>{
      const items = grouped[cat];
      if(!items || !items.length) return;
      html += '<div class="cat-header">'+escapeHtml(cat)+' ('+items.length+')</div>';
      items.forEach(item=>{ html += renderLimitCard(item); });
    });
    html += '<div class="cat-header">📎 합산기준 참고표</div>';
    Object.keys(aggBlocks).forEach(title=>{
      html += '<div class="agg-block-card"><div class="agg-block-title">'+escapeHtml(title)+'</div>'+escapeHtml(aggBlocks[title])+'</div>';
    });
    results.innerHTML = html;
    return;
  }

  // 검색어가 있으면: 담보명 + 합산기준 텍스트 전체를 훑어서 매칭된 것만 표시
  const limitMatches = LIMITS.filter(item=>norm(item.name).includes(nq));
  const aggMatches = Object.keys(aggBlocks).filter(title=>norm(title).includes(nq)||norm(aggBlocks[title]).includes(nq));

  if(!limitMatches.length && !aggMatches.length){
    results.innerHTML = '<div class="empty">"'+escapeHtml(query)+'"에 대한 결과가 없어요.</div>';
    return;
  }
  let html = '';
  if(limitMatches.length){
    html += '<div class="cat-header">📋 가입한도 ('+limitMatches.length+')</div>';
    limitMatches.forEach(item=>{ html += renderLimitCard(item); });
  }
  if(aggMatches.length){
    html += '<div class="cat-header">📎 합산기준 참고표 ('+aggMatches.length+')</div>';
    aggMatches.forEach(title=>{
      html += '<div class="agg-block-card"><div class="agg-block-title">'+escapeHtml(title)+'</div>'+escapeHtml(aggBlocks[title])+'</div>';
    });
  }
  results.innerHTML = html;
}

function search(query){
  if(curMode==='overview'){
    renderLimitsOverview(query);
    return;
  }
  const q = norm(query);
  const results = document.getElementById('results');
  if(q.length===0){
    results.innerHTML = '<div class="empty">담보명, 질병명, 또는 ICD 코드를 입력해보세요.<br><br>예) "순환계" · "알츠하이머" · "G30" · "장기요양3등급"</div>';
    return;
  }

  // 검색어 동의어 매핑: 일상용어로 검색해도 실제 담보/질병명이 걸리도록
  const SEARCH_SYNONYMS = { '용종': '양성신생물', '물혹': '양성신생물' };
  const qList = [q];
  Object.keys(SEARCH_SYNONYMS).forEach(k=>{
    const nk = norm(k);
    if(q===nk || nk.includes(q) || q.includes(nk)) qList.push(norm(SEARCH_SYNONYMS[k]));
  });
  const matchAny = (name) => { const nn=norm(name); return qList.some(x=>nn.includes(x)); };

  let html = '';
  let totalCount = 0;

  // 1. 질병코드 검색 (코드 또는 질병명) — 맨 위
  const qUpper = query.trim().toUpperCase().replace(/\s+/g,'');
  let codeMatches = [];
  const matchedCatKeys = new Set();
  Object.keys(DISEASE_CODES).forEach(catKey=>{
    DISEASE_CODES[catKey].items.forEach(item=>{
      const codeHit = qUpper.length>=1 && item.code.toUpperCase().replace(/\s+/g,'').includes(qUpper) && /[A-Z]/.test(qUpper);
      const nameHit = norm(item.name).includes(q);
      if(codeHit || nameHit){
        codeMatches.push({catKey:catKey, item:item});
        matchedCatKeys.add(catKey);
      }
    });
  });
  if(codeMatches.length>0){
    html += '<div class="section-label">🧬 질병코드 분류 ('+codeMatches.length+')</div>';
    codeMatches.slice(0,30).forEach(m=>{ html += renderDiseaseCodeCard(m.catKey, m.item); });
    totalCount += codeMatches.length;
  }

  // 2. 가입한도 검색
  const limitMatches = LIMITS.filter(item=>norm(item.name).includes(q));
  if(limitMatches.length>0){
    html += '<div class="section-label">📋 가입한도 ('+limitMatches.length+')</div>';
    limitMatches.forEach(item=>{ html += renderLimitCard(item); });
    totalCount += limitMatches.length;
  }

  // 코드 매칭 시: 치료비 한도카드 표시 (진단카드는 disease code card에 포함)
  const treatmentLimitMap = {
    '순환계': ['순환계질환Ⅰ 통합치료','순환계질환Ⅰ 주요치료(치료별연1회한)','순환계질환Ⅱ 주요치료(연1회한)'],
    '정신계': ['정신계질환 통합치료'],
    '신경계': ['신경계질환 통합치료','신경계질환 주요치료(연1회한)','신경계질환주요치료(치료별 연1회)'],
  };
  if(matchedCatKeys.size > 0 && limitMatches.length === 0){
    const treatMatches = [];
    matchedCatKeys.forEach(catKey=>{
      const names = treatmentLimitMap[catKey] || [];
      names.forEach(name=>{
        const found = LIMITS.find(l=>l.name===name);
        if(found && !treatMatches.find(l=>l.name===name)) treatMatches.push(found);
      });
    });
    if(treatMatches.length>0){
      html += '<div class="section-label">🏥 치료비 한도 ('+treatMatches.length+')</div>';
      treatMatches.forEach(item=>{ html += renderLimitCard(item); });
      totalCount += treatMatches.length;
    }
  }

  // 3. 담보명이 특정 실제 특약명과 매치되는 경우 -> 카테고리 안내
  const contractMatches = Object.keys(CONTRACT_TO_CAT).filter(name=>norm(name).includes(q));
  if(contractMatches.length>0){
    html += '<div class="section-label">🏷️ 특약명 매치 ('+contractMatches.length+')</div>';
    contractMatches.slice(0,10).forEach(name=>{ html += renderContractCategoryNote(name, CONTRACT_TO_CAT[name]); });
    totalCount += contractMatches.length;
  }

  // 4. 예외인수기준 (질병명 매치)
  const uwMatches = UW_ROWS.filter(row=>matchAny(row.name));
  if(uwMatches.length>0){
    html += '<div class="section-label">✅ 예외인수기준 ('+uwMatches.length+')</div>';
    uwMatches.slice(0,30).forEach(row=>{ html += renderUnderwritingCard(row); });
    totalCount += uwMatches.length;
  }

  // 5. 합산기준 참고표 (LTC 등급/생활자금, 신경계 등 텍스트 안에 있는 내용도 검색)
  const aggBlocks = RAW.limits.aggBlocks || {};
  const aggMatches = Object.keys(aggBlocks).filter(title=>norm(title).includes(q)||norm(aggBlocks[title]).includes(q));
  if(aggMatches.length>0){
    html += '<div class="section-label">📎 합산기준 참고표 ('+aggMatches.length+')</div>';
    aggMatches.forEach(title=>{
      html += '<div class="agg-block-card"><div class="agg-block-title">'+escapeHtml(title)+'</div>'+escapeHtml(aggBlocks[title])+'</div>';
    });
    totalCount += aggMatches.length;
  }

  if(totalCount===0){
    html = '<div class="empty">"'+escapeHtml(query)+'"에 대한 결과가 없어요.<br><br>다른 표현으로 검색해보세요. (예: 정식 질병명, 담보 약칭, 코드 일부)</div>';
  }

  results.innerHTML = html;
}

const box = document.getElementById('searchBox');


function doSearch(){ search(box.value); }
box.addEventListener('input', doSearch);
box.addEventListener('compositionend', doSearch);
box.addEventListener('keyup', doSearch);

  </script>
